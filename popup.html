<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BGU Companion</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup-shell">
    <div class="container">
      <header class="topbar">
        <button id="btnBack" class="icon-btn" type="button" aria-label="Back" hidden>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>
        <div class="topbar-title" id="titleText">BGU Companion</div>
        <div class="topbar-spacer"></div>
      </header>

      <section id="view-main" data-view="main" class="view">
        <div class="card">
          <button id="btnCourses" type="button" class="big-btn">
            <svg viewBox="0 0 24 24"><path d="M5 4.75A2.75 2.75 0 0 1 7.75 2H19a1 1 0 0 1 1 1v15.25a1 1 0 0 1-1.447.895A4.75 4.75 0 0 0 16.375 18H7.75A2.75 2.75 0 0 0 5 20.75V4.75zm2.75-.75A1.75 1.75 0 0 0 6 5.75v11.112A4.72 4.72 0 0 1 7.75 16.5h8.625c.561 0 1.111.099 1.625.289V4H7.75z"/><path d="M8.5 7h6a.75.75 0 0 1 0 1.5h-6a.75.75 0 0 1 0-1.5zm0 3h7a.75.75 0 0 1 0 1.5h-7a.75.75 0 0 1 0-1.5z"/></svg>
           קורסים
          </button>
          <button id="btnGezer" type="button" class="big-btn">
            <svg viewBox="0 0 24 24"><path d="M14.925 3.38c.9-.253 1.975-.247 2.925.12.206.08.292.33.18.52l-1.374 2.332a.375.375 0 0 1-.436.171c-.838-.237-1.622-.195-2.409.118a.375.375 0 0 1-.493-.22l-.69-2.05a.375.375 0 0 1 .245-.473A7.16 7.16 0 0 1 14.925 3.38z"/><path d="M12.578 7.177c1.325-.445 2.952.167 3.797 1.595.88 1.487.99 3.519.392 5.347-.602 1.84-1.955 3.52-3.748 4.35-1.38.639-3.027.705-4.369-.084-1.34-.789-2.12-2.327-2.314-3.973-.25-2.121.453-4.414 1.924-5.913a6.385 6.385 0 0 1 4.318-1.822zm-.301 1.58c-1.11.12-2.159.737-2.88 1.595-1.11 1.322-1.648 3.215-1.415 4.92.14 1.024.6 1.95 1.37 2.484.77.534 1.791.65 2.793.29 1.36-.487 2.474-1.746 3.045-3.143.57-1.393.627-2.92.067-4.068-.54-1.106-1.639-1.967-2.98-2.078z"/></svg>
            גזר (מבחנים)
          </button>
          <button id="btnInfo" type="button" class="big-btn">
            <svg viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            מידע אישי
          </button>
          <button id="btnPortal" type="button" class="big-btn">
            <svg viewBox="0 0 24 24"><path d="M3 5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5zm4 2v10h10V7H7zm2 2h6v2H9V9zm0 4h4v2H9v-2z"/></svg>
            פורטל הסטודנט
          </button>
          <button id="btnSettings" type="button" class="big-btn">
            <svg viewBox="0 0 24 24"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><circle cx="12" cy="12" r="3"/></svg>
            הגדרות
          </button>
        </div>
        <p class="hint"> מרכז מהיר למערכות סטודנטים</p>
      </section>

      <section id="view-courses" data-view="courses" class="view" hidden>
        <h2 class="subtitle">קורסים</h2>
        <div class="search">
          <input id="searchInput" type="text" placeholder="חפש קורס..." aria-label="Search courses" autofocus />
          <button id="searchBtn" type="button">פתח</button>
        </div>
        <div id="message" class="message" role="status"></div>
        <ul id="results" class="results" aria-live="polite"></ul>
      </section>
    </div>
  </div>
  <script src="courses-data.js"></script>
  <script src="popup.js"></script>
</body>
</html>
