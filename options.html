<!doctype html>
<html lang="he">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BGU Companion — הגדרות</title>
  <link rel="stylesheet" href="popup.css" />
</head>

<body class="options">
  <div class="container">
    <header class="topbar">
      <div class="topbar-title">BGU Companion — הגדרות</div>
      <div class="topbar-spacer"></div>
    </header>

    <div class="options-grid">
      <div style="display:flex; flex-direction:column; gap:20px;">
        <section class="card">
          <div class="subtitle">פרופיל (מילוי אוטומטי)</div>

          <div class="search">
            <input id="usernameShort" type="text" placeholder="שם משתמש (לפני @) למשל: yoavne26" />
            <input id="studentId" type="text" inputmode="numeric" maxlength="9" placeholder="תעודת זהות (9 ספרות)" />
          </div>

          <label>
            <input id="autofillEnabled" type="checkbox" />
            <span>הפעל מילוי אוטומטי באתרי בן גוריון</span>
          </label>

          <button id="saveProfileBtn" class="big-btn" type="button">שמור פרופיל</button>
          <div id="profileStatus" class="message" role="status"></div>

          <div class="hint-inline">
            הסיסמה מטופלת על ידי מנהל הסיסמאות של Chrome (אנחנו לא שומרים אותה).
          </div>
        </section>

        <section class="card">
          <div class="subtitle">הוסף קורס</div>

          <div class="search">
            <input id="courseName" type="text" placeholder="שם הקורס (עברית/אנגלית)" />
            <input id="courseUrl" type="url" placeholder="קישור לקורס (https://...)" />
          </div>

          <button id="addCourseBtn" class="big-btn" type="button">הוסף / עדכן</button>
          <div id="status" class="message" role="status"></div>
        </section>
      </div>

      <section class="card">
        <div class="subtitle">קורסים</div>

        <div class="table-wrap">
          <table class="courses-table">
            <thead>
              <tr>
                <th>שם</th>
                <th>קישור</th>
                <th>פעולות</th>
              </tr>
            </thead>
            <tbody id="courseTableBody"></tbody>
          </table>
        </div>
      </section>
    </div>
  </div>

  <script src="courses-data.js"></script>
  <script src="options.js"></script>
</body>
</html>
